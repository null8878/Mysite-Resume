name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=public --site 5f0ae365-5a87-42d5-bf3e-7abd1bb1578d --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}
